name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: child_ai_tools
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/child_ai_tools?schema=public
      AUTH_SECRET: ci-test-secret-key-for-auth-js-min-32-chars
      AUTH_URL: http://localhost:3000
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: admin12345

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma migrate deploy
      - run: npx prisma db seed
      - run: npm run test:unit
      - run: npm run lint
      - run: npm run build

  deploy-beta:
    name: Deploy to Cloudflare Workers
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build OpenNext for Cloudflare
        run: npx opennextjs-cloudflare build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_URL: ${{ secrets.AUTH_URL }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.AUTH_URL }}
          LLM_API_URL: https://open.bigmodel.cn/api/paas/v4/chat/completions
          LLM_MODEL: glm-4-flash-250414
      - name: Sync Worker secrets
        run: |
          printf '%s' "$DATABASE_URL" | npx wrangler secret put DATABASE_URL
          printf '%s' "$AUTH_SECRET" | npx wrangler secret put AUTH_SECRET
          printf '%s' "$LLM_API_KEY" | npx wrangler secret put LLM_API_KEY
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      - name: Deploy Worker
        run: npx wrangler deploy
