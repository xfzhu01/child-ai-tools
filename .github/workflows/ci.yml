name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: child_ai_tools
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/child_ai_tools?schema=public
      AUTH_SECRET: ci-test-secret-key-for-auth-js-min-32-chars
      AUTH_URL: http://localhost:3000
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: admin12345

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma migrate deploy
      - run: npx prisma db seed
      - run: npm run test:unit
      - run: npm run lint
      - run: npm run build

  deploy-beta:
    name: Deploy to Vercel
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      AUTH_URL: ${{ secrets.AUTH_URL }}
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      NEXT_PUBLIC_APP_URL: ${{ secrets.AUTH_URL }}
      LLM_API_URL: https://open.bigmodel.cn/api/paas/v4/chat/completions
      LLM_MODEL: glm-4-flash-250414
      NEXT_PUBLIC_APP_NAME: 小宝打字
      DATABASE_POOL_MAX: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Validate deploy secrets
        run: |
          test -n "$VERCEL_TOKEN" || (echo "Missing GitHub secret: VERCEL_TOKEN" && exit 1)
          test -n "$VERCEL_ORG_ID" || (echo "Missing GitHub secret: VERCEL_ORG_ID" && exit 1)
          test -n "$VERCEL_PROJECT_ID" || (echo "Missing GitHub secret: VERCEL_PROJECT_ID" && exit 1)
          test -n "$DATABASE_URL" || (echo "Missing GitHub secret: DATABASE_URL" && exit 1)
          test -n "$AUTH_SECRET" || (echo "Missing GitHub secret: AUTH_SECRET" && exit 1)
          test -n "$AUTH_URL" || (echo "Missing GitHub secret: AUTH_URL" && exit 1)
          test -n "$LLM_API_KEY" || (echo "Missing GitHub secret: LLM_API_KEY" && exit 1)
      - name: Sync Vercel env from GitHub secrets
        run: bash scripts/sync-vercel-env-ci.sh
      - name: Deploy to Vercel
        run: npx vercel@latest deploy --prod --token="$VERCEL_TOKEN"
