name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: child_ai_tools
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/child_ai_tools?schema=public
      AUTH_SECRET: ci-test-secret-key-for-auth-js-min-32-chars
      AUTH_URL: http://localhost:3000
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: admin12345

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma migrate deploy
      - run: npx prisma db seed
      - run: npm run test:unit
      - run: npm run lint
      - run: npm run build

  deploy-vercel:
    name: Deploy to Vercel
    needs: test
    if: >-
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      (vars.DEPLOY_TARGET == 'vercel' ||
       vars.DEPLOY_TARGET == 'all' ||
       vars.DEPLOY_TARGET == '')
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      AUTH_URL: ${{ secrets.AUTH_URL }}
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      NEXT_PUBLIC_APP_URL: ${{ secrets.AUTH_URL }}
      LLM_API_URL: https://open.bigmodel.cn/api/paas/v4/chat/completions
      LLM_MODEL: glm-4-flash-250414
      NEXT_PUBLIC_APP_NAME: 小宝打字
      DATABASE_POOL_MAX: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Validate Vercel secrets
        run: |
          missing=0
          check() { [[ -n "${!1:-}" ]] || { echo "Missing secret: $1"; missing=1; }; }
          check VERCEL_TOKEN
          check VERCEL_ORG_ID
          check VERCEL_PROJECT_ID
          check DATABASE_URL
          check AUTH_SECRET
          check AUTH_URL
          check LLM_API_KEY
          if (( missing )); then exit 1; fi
      - name: Sync Vercel env
        run: bash scripts/sync-vercel-env-ci.sh
      - name: Deploy
        run: npx vercel@latest deploy --prod --token="$VERCEL_TOKEN"

  deploy-aliyun:
    name: Deploy to Aliyun ECS
    needs: test
    if: >-
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      (vars.DEPLOY_TARGET == 'aliyun' || vars.DEPLOY_TARGET == 'all')
    runs-on: ubuntu-latest
    env:
      ALIYUN_SSH_HOST: ${{ secrets.ALIYUN_SSH_HOST }}
      ALIYUN_SSH_USER: ${{ secrets.ALIYUN_SSH_USER }}
      ALIYUN_SSH_PRIVATE_KEY: ${{ secrets.ALIYUN_SSH_PRIVATE_KEY }}
      ALIYUN_AUTH_URL: ${{ secrets.ALIYUN_AUTH_URL }}
      AUTH_URL: ${{ secrets.ALIYUN_AUTH_URL }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      LLM_API_URL: https://open.bigmodel.cn/api/paas/v4/chat/completions
      LLM_MODEL: glm-4-flash-250414
      NEXT_PUBLIC_APP_NAME: 小宝打字
      DATABASE_POOL_MAX: "1"
    steps:
      - uses: actions/checkout@v4
      - name: Validate Aliyun secrets
        run: |
          missing=0
          check() { [[ -n "${!1:-}" ]] || { echo "Missing secret: $1"; missing=1; }; }
          check ALIYUN_SSH_HOST
          check ALIYUN_SSH_USER
          check ALIYUN_SSH_PRIVATE_KEY
          check DATABASE_URL
          check AUTH_SECRET
          check LLM_API_KEY
          check ALIYUN_AUTH_URL
          if (( missing )); then exit 1; fi
      - name: Deploy to ECS
        run: bash scripts/deploy-aliyun-ci.sh
